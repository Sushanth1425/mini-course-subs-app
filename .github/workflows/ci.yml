name: Node CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Start backend
        run: |
          cd backend
          nohup npm run dev &
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install

      - name: Run Playwright tests
        run: |
          cd frontend
          npm run test:e2e
        env:
          VITE_API_URL: https://mini-course-subs-app.onrender.com/api